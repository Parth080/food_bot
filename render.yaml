services:
  - type: web
    name: janta-poll-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    # Free tier ~512MB RAM: keep --workers 1 (processes eat RAM; also one in-app cron).
    # Threads share one process; 8–12 is safer on 512MB, 16 if stable after monitoring.
    startCommand: gunicorn app:flask_app --workers 1 --worker-class gthread --threads 12 --timeout 90 --bind 0.0.0.0:$PORT
    envVars:
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: SLACK_CHANNEL_ID
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_SA_PROJECT_ID
        sync: false
      - key: GOOGLE_SA_PRIVATE_KEY_ID
        sync: false
      - key: GOOGLE_SA_PRIVATE_KEY
        sync: false
      - key: GOOGLE_SA_CLIENT_EMAIL
        sync: false
      - key: GOOGLE_SA_CLIENT_ID
        sync: false
      # Optional memory hygiene knobs (safe defaults if omitted):
      # MEMORY_HYGIENE_ENABLED=1
      # MEMORY_CLEANUP_INTERVAL_SECONDS=600
      # MEMORY_USE_MALLOC_TRIM=1
